services:
  mysqlsrv:
    image: mysql:8.4.0
    container_name: witcher-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - witcher_db_data:/var/lib/mysql

  backend:
    image: eclipse-temurin:25-jre-alpine
    container_name: witcher-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
          - ./Backend/target/Backend-0.0.1-SNAPSHOT.jar:/app/app.jar
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_CONTAINER=mysqlsrv
      - DATABASE_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    working_dir: /app
    command: java -jar app.jar
    depends_on:
      - mysqlsrv

volumes:
  witcher_db_data:

