<div class="witcher-background">

  <div class="register-container">

    <!-- <div class="wolf-logo">
      <img src="assets/images/wolf-school.png" alt="School of the Wolf">
    </div> -->

    <h1>Kaer Morhen</h1>
    <h2>Begin Your Training</h2>

    <form [formGroup]="RegisterForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="e.g. johndoe">

        <small
          *ngIf="username?.invalid && username?.touched"
          class="error-message">
          Username is required.
        </small>
      </div>

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input
          id="fullname"
          type="text"
          formControlName="fullname"
          placeholder="e.g. John Doe">

        <small
          *ngIf="fullname?.invalid && fullname?.touched"
          class="error-message">
          Please enter your full name.
        </small>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="e.g. john@email.com">

        <small
          *ngIf="email?.invalid && email?.touched"
          class="error-message">
          Please enter a valid e-mail address.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Minimum 6 characters">

        <small
          *ngIf="password?.invalid && password?.touched"
          class="error-message">
          Password must be at least 6 characters long.
        </small>
      </div>

      <div *ngIf="errorMessage" class="backend-error">
        {{ errorMessage }}
      </div>

      <button
        class="register-button"
        type="submit"
        [disabled]="RegisterForm.invalid">
        Become a Witcher
      </button>

      <div class="login-link">
        <span>Already a member of the School of the Wolf?</span>

        <button
          type="button"
          routerLink="/login"
          class="back-button">
          Return to Login
        </button>
      </div>

    </form>

  </div>

</div>
